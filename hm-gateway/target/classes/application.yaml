server:
  port: 8080

spring:
  application:
    name: gateway
  cloud:
    nacos:
      server-addr: 127.0.0.1:8848
    gateway:
      routes:
          - id: item-service
            uri: lb://item-service
            predicates:
              - Path=/items/**,/search/**

          - id: user-service
            uri: lb://user-service
            predicates:
              - Path=/users/**,/addresses/**

          - id: cart-service
            uri: lb://cart-service
            predicates:
              - Path=/carts/**

          - id: trade-service
            uri: lb://trade-service
            predicates:
              - Path=/orders/**

          - id: pay-service
            uri: lb://pay-service
            predicates:
              - Path=/pay-orders/**



hm:
  jwt:
    location: classpath:hmall.jks
    alias: hmall
    password: hmall123
    tokenTTL: 7d
  auth:
    excludePaths:
      - /ai/**
      - /search/**
      - /users/login
      - /items/**
      - /hi